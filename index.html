<!doctype html>
<html lang="pt-br" data-bs-theme="dark">

	<head>
		<meta charset="UTF-8"/>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>Game of Life</title>
	</head>

	<body style="height: 99dvh">
		<div class='position-relative d-flex flex-column h-100' id="app">

			<div class="shadow d-flex justify-content-center bg-secondary-subtle rounded-5 rounded-top-0">
				<div id="controlPanel" class="d-flex flex-row justify-content-center text-center p-4">
					<div class="d-flex flex-row gap-2 mx-2">
						<div class="col d-flex flex-column gap-2">
							<span class="fs-4">Automático</span>
							<div class="d-flex gap-2">
								<button id="btnToggleRun" disabled type="button" class="btn btn-primary col">Iniciar</button>
							</div>
							<label>Velocidade
								<input type="range" id="speedSlider" step="1" min="1" max="10" disabled></label>
						</div>
						<div class="vr mx-3"></div>
						<div class="col d-flex flex-column gap-2">
							<span class="fs-4">Manual</span>
							<div class="d-flex flex-column gap-2">
								<div class="d-flex flex-row gap-2">
									<button id="btnPrev" type="button" class="btn btn-primary col" disabled>Anterior</button>
									<button id="btnNext" type="button" class="btn btn-primary col" disabled>Próximo</button>
								</div>
								<button id="btnClear" type="button" class="btn btn-primary" disabled>Limpar</button>
							</div>
						</div>
					</div>
					<div class="vr mx-3"></div>
					<div class="d-flex flex-column gap-2">
						<div class="d-flex flex-column align-items-center gap-1">
							<span class="fs-4">Geração</span>
							<span id="genCount" class="fs-5">1</span>
						</div>
						<div class="d-flex flex-column align-items-center gap-1">
							<span class="fs-4">População</span>
							<span id="populationCount" class="fs-5">0</span>
						</div>
					</div>
				</div>
			</div>
			<div class="flex-grow-1" id="canvasContainer">
				<canvas style="position: absolute" id="bgCanvas"></canvas>
				<canvas style="position: absolute" id="gameCanvas"></canvas>
			</div>
		</div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
